name: Auto Version

on:
  push:
    branches: [main]
    paths: ['plugins/**']

permissions:
  contents: write

jobs:
  auto-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[auto-version]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changes and bump versions
        id: version
        run: |
          MARKETPLACE_JSON=".claude-plugin/marketplace.json"
          PLUGINS=("team" "think" "arena" "audit")
          CHANGED_PLUGINS=""
          GLOBAL_BUMP="patch"

          # Find last unified tag
          LAST_TAG=$(git tag -l "v*" --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            DIFF_REF=$(git rev-list --max-parents=0 HEAD)
          else
            DIFF_REF="$LAST_TAG"
          fi

          # Detect which plugins changed and determine bump type
          for plugin in "${PLUGINS[@]}"; do
            PLUGIN_DIR="plugins/${plugin}"
            PLUGIN_JSON="${PLUGIN_DIR}/.claude-plugin/plugin.json"

            CHANGED_FILES=$(git diff --name-only "$DIFF_REF"..HEAD -- "$PLUGIN_DIR" 2>/dev/null || true)
            if [ -z "$CHANGED_FILES" ]; then
              continue
            fi

            # Bump individual plugin version (patch only — keeps marketplace in sync)
            CURRENT=$(jq -r '.version' "$PLUGIN_JSON")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            NEW_PLUGIN_VERSION="${MAJOR}.${MINOR}.${PATCH}"

            jq --arg v "$NEW_PLUGIN_VERSION" '.version = $v' "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"
            jq --arg name "$plugin" --arg v "$NEW_PLUGIN_VERSION" \
              '(.plugins[] | select(.name == $name)).version = $v' \
              "$MARKETPLACE_JSON" > tmp.json && mv tmp.json "$MARKETPLACE_JSON"

            CHANGED_PLUGINS="${CHANGED_PLUGINS}- **${plugin}** v${NEW_PLUGIN_VERSION}\n"
          done

          if [ -z "$CHANGED_PLUGINS" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No plugin changes detected"
            exit 0
          fi

          # Parse commits for unified bump type
          COMMITS=$(git log --format="%s" "$DIFF_REF"..HEAD -- plugins/ 2>/dev/null || true)
          while IFS= read -r msg; do
            if echo "$msg" | grep -qiE "BREAKING CHANGE|^feat!:|^fix!:"; then
              GLOBAL_BUMP="major"
              break
            elif echo "$msg" | grep -qiE "^feat(\(.+\))?:"; then
              GLOBAL_BUMP="minor"
            fi
          done <<< "$COMMITS"

          # Bump unified version
          CURRENT_VERSION=$(jq -r '.version' "$MARKETPLACE_JSON")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "$GLOBAL_BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          jq --arg v "$NEW_VERSION" '.version = $v' "$MARKETPLACE_JSON" > tmp.json && mv tmp.json "$MARKETPLACE_JSON"

          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "changed_plugins<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$CHANGED_PLUGINS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "bump_type=${GLOBAL_BUMP}" >> "$GITHUB_OUTPUT"

          echo "Unified version: v${NEW_VERSION} (${GLOBAL_BUMP})"
          echo -e "Changed plugins:\n${CHANGED_PLUGINS}"

      - name: Commit and tag
        if: steps.version.outputs.bumped == 'true'
        run: |
          git add .claude-plugin/marketplace.json plugins/*/.claude-plugin/plugin.json
          git commit -m "$(cat <<EOF
          chore: bump to v${{ steps.version.outputs.version }} [auto-version]
          EOF
          )"

          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.version.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "$(cat <<'EOF'
          ## Plugins updated

          ${{ steps.version.outputs.changed_plugins }}

          ---
          Install: `/plugin marketplace add izzzzzi/izTeam`
          EOF
          )"
